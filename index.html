
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNSSJP PRO - Extractor de Efemérides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .console { font-family: 'Courier New', Courier, monospace; background-color: #050505; color: #00ff33; white-space: pre-wrap; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans p-4">

    <div class="container mx-auto max-w-2xl bg-gray-800 p-6 rounded shadow-lg border border-gray-700 mt-10">
        <header class="border-b border-gray-700 pb-4 mb-6">
            <h1 class="text-2xl font-bold text-green-400">GNSSJP PRO - IGS Downloader</h1>
            <p class="text-gray-400 text-sm">Navegación y Efemérides SP3 (Bypass CORS) | "Dato mata relato"</p>
        </header>

        <form id="form-extractor" onsubmit="procesarRinex(event)">
            <div class="mb-4">
                <label class="block text-sm mb-2 font-bold text-blue-400">1. Sube tu archivo RINEX (.obs) para extraer época:</label>
                <input type="file" id="obs_file" required accept=".obs,.rnx" class="w-full bg-gray-700 p-3 rounded border border-blue-500 text-white mb-4">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm mb-2 font-bold text-yellow-400">Servidor a consultar:</label>
                    <select id="servidor_select" class="w-full bg-gray-700 p-3 rounded border border-yellow-500 text-white">
                        <option value="BKG">Alemania (BKG)</option>
                        <option value="IGN">Francia (IGN)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-2 font-bold text-purple-400">Tipo de Efeméride SP3:</label>
                    <select id="sp3_tipo" class="w-full bg-gray-700 p-3 rounded border border-purple-500 text-white">
                        <option value="igu">Ultra Rápidas (igu)</option>
                        <option value="igr">Rápidas (igr)</option>
                        <option value="igs">Finas (igs)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition shadow-lg">Analizar Archivo y Calcular Tiempos</button>
        </form>

        <div id="resultado-consola" class="console p-4 mt-6 h-40 overflow-y-auto border border-gray-700 rounded hidden"></div>
        
        <div id="enlaces-contenedor" class="mt-6 hidden">
            <h2 class="text-lg font-bold text-green-400 mb-3 border-b border-gray-700 pb-2">2. Resultados de Descarga:</h2>
            <div id="botones-descarga" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <script>
        function calcularGPSWeek(dateUTC) {
            const gpsEpoch = new Date(Date.UTC(1980, 0, 6, 0, 0, 0));
            const diffMs = dateUTC.getTime() - gpsEpoch.getTime();
            const week = Math.floor(diffMs / (7 * 86400000));
            const dow = dateUTC.getUTCDay();
            return { week: String(week).padStart(4, '0'), dow };
        }

        function calcularDOY(year, month, day) {
            const current = new Date(Date.UTC(year, month - 1, day));
            const start = new Date(Date.UTC(year, 0, 1));
            return Math.floor((current - start) / 86400000) + 1;
        }

        function formatTimeDiff(ms) {
            if (ms <= 0) return "¡Disponible!";
            const totalMins = Math.ceil(ms / 60000);
            const hours = Math.floor(totalMins / 60);
            const mins = totalMins % 60;
            return `Faltan ${hours}h ${mins}m`;
        }

        function crearBotonEstado(url, releaseTimeUTC, filename, tipoEtiqueta) {
            const now = new Date();
            const timeDiffMs = releaseTimeUTC.getTime() - now.getTime();
            const isAvailable = timeDiffMs <= 0;
            
            let btn = document.createElement('a');
            if (isAvailable) {
                btn.href = url;
                btn.target = "_blank"; 
                btn.className = "bg-green-700 hover:bg-green-600 text-white font-bold py-3 px-4 rounded text-center block transition border border-green-500 shadow-md";
                btn.innerHTML = `⬇️ Descargar ${tipoEtiqueta}: ${filename}`;
            } else {
                btn.className = "bg-red-800 text-gray-300 font-bold py-3 px-4 rounded text-center block cursor-not-allowed border border-red-900 shadow-sm";
                btn.innerHTML = `🚫 Bloqueado (${tipoEtiqueta}) | ${formatTimeDiff(timeDiffMs)}`;
                btn.onclick = (e) => { e.preventDefault(); };
            }
            return btn;
        }

        async function procesarRinex(e) {
            e.preventDefault();
            const file = document.getElementById('obs_file').files[0];
            const servidor = document.getElementById('servidor_select').value;
            const sp3Tipo = document.getElementById('sp3_tipo').value;
            const consola = document.getElementById('resultado-consola');
            const contenedorBotones = document.getElementById('botones-descarga');
            
            consola.classList.remove('hidden');
            contenedorBotones.innerHTML = '';
            consola.innerHTML = "> Auditando cabecera del archivo...\n";

            try {
                // Corrección: Uso de FileReader para evitar bloqueo en Android
                const text = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => resolve(ev.target.result);
                    reader.onerror = () => reject(new Error("Fallo al leer archivo en Android"));
                    reader.readAsText(file.slice(0, 102400));
                });

                const lines = text.split(/\r?\n/);
                let fechaEncontrada = null;
                for (let line of lines) {
                    if (line.startsWith('>')) {
                        let p = line.substring(1).trim().split(/\s+/);
                        if (p.length >= 6) {
                            fechaEncontrada = { year: parseInt(p[0]) < 100 ? parseInt(p[0])+2000 : parseInt(p[0]), 
                                                month: parseInt(p[1]), day: parseInt(p[2]), hour: parseInt(p[3]), minute: parseInt(p[4]) };
                            break;
                        }
                    }
                }

                if (!fechaEncontrada) throw new Error("No se halló etiqueta '>'");

                const { year, month, day, hour, minute } = fechaEncontrada;
                const obsDateUTC = new Date(Date.UTC(year, month - 1, day, hour, minute, 0));
                const { week, dow } = calcularGPSWeek(obsDateUTC);
                const doyStr = String(calcularDOY(year, month, day)).padStart(3, '0');
                const hourStr = String(hour).padStart(2, '0');

                // Navegación
                const navRelease = new Date(Date.UTC(year, month-1, day, hour, 90, 0)); // +90 min
                const navName = `BRDC00${servidor==='BKG'?'BKG':'IGS'}_R_${year}${doyStr}${hourStr}00_01H_MN.rnx.gz`;
                const navUrl = servidor === 'BKG' ? `https://igs.bkg.bund.de/root_ftp/IGS/BRDC/${year}/${doyStr}/${navName}` : `ftp://igs.ign.fr/pub/igs/data/${year}/${doyStr}/${navName}`;
                
                contenedorBotones.appendChild(crearBotonEstado(navUrl, navRelease, navName, "Nav"));

                // SP3
                let sp3Release = new Date(obsDateUTC.getTime());
                let sp3Name = "";
                if(sp3Tipo === 'igu') { sp3Release = new Date(obsDateUTC.getTime() + 3 * 3600000); sp3Name = `igu${week}${dow}_${String(Math.floor(hour/6)*6).padStart(2,'0')}.sp3.Z`; }
                else if(sp3Tipo === 'igr') { sp3Release = new Date(Date.UTC(year, month-1, day+1, 17, 0, 0)); sp3Name = `igr${week}${dow}.sp3.Z`; }
                else { sp3Release = new Date(Date.UTC(year, month-1, day+13, 0, 0, 0)); sp3Name = `igs${week}${dow}.sp3.Z`; }

                const sp3Url = servidor === 'BKG' ? `https://igs.bkg.bund.de/root_ftp/IGS/products/${week}/${sp3Name}` : `ftp://igs.ign.fr/pub/igs/products/${week}/${sp3Name}`;
                contenedorBotones.appendChild(crearBotonEstado(sp3Url, sp3Release, sp3Name, sp3Tipo.toUpperCase()));

                document.getElementById('enlaces-contenedor').classList.remove('hidden');
            } catch (err) { consola.innerHTML += `> [ERROR] ${err.message}\n`; }
        }
    </script>
</body>
</html>
